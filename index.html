<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Zubii ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&family=Cinzel:wght@700&family=Allura&display=swap" rel="stylesheet">
  
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#09011f,#18002f,#2d004d);
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.container{
text-align:center;
background:rgba(255,255,255,.08);
backdrop-filter:blur(12px);
padding:50px;
border-radius:30px;
border:1px solid rgba(255,255,255,.2);
box-shadow:0 0 40px rgba(255,255,255,.15);
max-width:420px;
width:90%;
z-index:2;
}

h1{
font-family:'Cinzel',serif;
font-size:clamp(28px,6vw,48px);
letter-spacing:8px;
font-weight:700;
text-transform:uppercase;
color:#fff;
text-shadow:0 0 15px rgba(255,255,255,.4);
margin-bottom:18px;
}

.name{
font-family:'Montserrat',sans-serif;
font-size: clamp(48px, 12vw, 90px);
font-weight:700;
background:linear-gradient(90deg,#FFD700,#fff,#FFD700);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}
.toyou{
font-size:18px;
letter-spacing:6px;
color:#ffb6d9;
margin-top:10px;
}

.tap{
margin-top:40px;
font-size:18px;
opacity:0;
animation:blink 1.2s infinite;
animation-delay:4s;
}

button{
margin-top:35px;
padding:16px 38px;
font-size:17px;
font-weight:600;
border:none;
border-radius:50px;
background:linear-gradient(135deg,#ff4b6e,#ff8a00);
color:white;
cursor:pointer;
box-shadow:0 8px 25px rgba(255,105,135,.45);
transition:.3s;
opacity:0;
animation:fade 2s forwards;
animation-delay:4s;
}

button:hover{
transform:scale(1.08);
}

.circle{
position:absolute;
border-radius:50%;
background:rgba(255,215,0,.15);
animation:float 10s linear infinite;
}

@keyframes fade{
to{opacity:1;}
}

@keyframes zoom{
0%{
opacity:0;
transform:scale(.3);
}
100%{
opacity:1;
transform:scale(1);
}
}

@keyframes blink{
0%,100%{opacity:1;}
50%{opacity:.2;}
}

@keyframes float{
0%{
transform:translateY(100vh) scale(0);
}
100%{
transform:translateY(-120vh) scale(1.8);
}
}
  #slide2{
display:none;
transform:rotateY(90deg);
opacity:0;
transition:1s;
}

#slide2.show{
display:block !important;
transform:rotateY(0deg);
opacity:1;
}
  
#slide3{
display:none;
transform:rotateY(90deg);
opacity:0;
transition:1s;
}

#slide3.show{
display:block !important;
transform:rotateY(0deg);
opacity:1;
}
  
.msg{
font-size:18px;
line-height:1.8;
margin:25px 0;
color:#fff;
}

h2{
font-family:'Allura',cursive;
font-size:55px;
color:#FFD700;
margin-bottom:20px;
}
.tapGift{
margin-top:35px;
font-size:20px;
color:#FFD700;
display:none;
animation:blink 1s infinite;
text-align:center;
}  
#giftBox{
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
background:#09011f;
z-index:999;
}

.gift{
position:relative;
width:180px;
height:180px;
animation:shake .6s infinite;
}

.box{
position:absolute;
bottom:0;
width:180px;
height:120px;
background:#ff4b6e;
border-radius:8px;
}

.lid{
position:absolute;
top:40px;
left:-5px;
width:190px;
height:35px;
background:#ff6f91;
border-radius:8px;
z-index:2;
transform-origin:left bottom;
transition:1s;
}

.open .lid{
transform:rotate(-35deg) translateY(-35px);
}

.ribbon-v{
position:absolute;
left:82px;
width:16px;
height:180px;
background:#FFD700;
z-index:3;
}

.ribbon-h{
position:absolute;
top:92px;
width:180px;
height:16px;
background:#FFD700;
z-index:3;
}

@keyframes shake{

0%{transform:rotate(0deg);}

25%{transform:rotate(3deg);}

50%{transform:rotate(-3deg);}

75%{transform:rotate(3deg);}

100%{transform:rotate(0deg);}

}  
  
</style>
</head>

<body>

<div class="container" id="slide1">

<h1 id="typing"></h1>

<div class="name">Zubii</div>

<p class="toyou">❤ Budhuuu ❤</p>

<button onclick="nextSlide()">
jaldi se touch karo hume  🎁
</button>
  
</div>  
  
<div id="giftBox" style="display:none; flex-direction:column;">

<div class="gift" onclick="openGift()">
<div class="lid"></div>
<div class="box"></div>
<div class="ribbon-v"></div>
<div class="ribbon-h"></div>
</div>

<div class="tapGift" id="tapGift">
☝️ Tap karo kholne ke liye ☝️
</div>
  
</div>
  
<div class="container" id="slide2" style="display:none;">

<h2>✨ Oyee Budhuuu... ✨</h2>

<p class="msg">
Khair...
<br><br>
Yeha tak aagyi tum to todha aur aage bhi dekh lo niche wala daba ke. 😌❤️
<br><br>
(button budhuu aur koi dusri chiz nhi🤣)...
</p>

<button onclick="showWarning()">
dabao na💦 ➜
</button>

</div>
  
<script>

const text="🎉 HAPPY BIRTHDAY TO YOU 🎉";
let i=0;

function type(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i);
i++;
setTimeout(type,90);
}
}
type();

function nextSlide(){

document.getElementById("slide1").style.display="none";

const gift=document.getElementById("giftBox");

gift.style.display="flex";

// 2 second shake
setTimeout(function(){

// Shake stop
document.querySelector(".gift").style.animation="none";

// Tap message show
document.getElementById("tapGift").style.display="block";

},2000);

}

function showWarning(){

document.getElementById("slide2").style.display="none";

const screen=document.createElement("div");

screen.style.position="fixed";
screen.style.top="0";
screen.style.left="0";
screen.style.width="100%";
screen.style.height="100%";
screen.style.background="#09011f";
screen.style.display="flex";
screen.style.justifyContent="center";
screen.style.alignItems="center";
screen.style.flexDirection="column";
screen.style.color="white";
screen.style.zIndex="9999";
screen.style.textAlign="center";
screen.style.padding="20px";

screen.innerHTML=`
<h1 style="color:#FFD700;font-size:34px;">Decrypting...</h1>

<div style="width:80%;height:10px;background:#333;border-radius:20px;margin:20px 0;">
<div id="bar" style="width:0%;height:100%;background:#FFD700;"></div>
</div>

<p style="font-size:18px;">ONLY FOR ZUBII ❤️</p>

<button id="goBtn" style="display:none;margin-top:20px;padding:10px 25px;">
Main hi Zubii hoon 🤭
</button>
`;

document.body.appendChild(screen);

// loading
setTimeout(()=>{
document.getElementById("bar").style.width="100%";
},500);

// show button
setTimeout(()=>{
document.getElementById("goBtn").style.display="block";
document.getElementById("goBtn").onclick=realSurprise;
},1500);

}
  
function realSurprise(){ 
  
for(let i=0;i<60;i++){
let conf=document.createElement("div");

conf.style.position="fixed";
conf.style.width="8px";
conf.style.height="8px";
conf.style.background=["#FFD700","#ff4b6e","#00e5ff","#ffffff"][Math.floor(Math.random()*4)];
conf.style.left=Math.random()*100+"vw";
conf.style.top="-10px";
conf.style.opacity="0.8";
conf.style.borderRadius="50%";
conf.style.animation=`fall ${2+Math.random()*3}s linear forwards`;

document.body.appendChild(conf);
}

const style=document.createElement("style");
style.innerHTML=`
@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
}
}
`;
document.head.appendChild(style);
  
setInterval(()=>{
let h=document.createElement("div");

h.innerHTML="❤️";
h.style.position="fixed";
h.style.left=Math.random()*100+"vw";
h.style.top="-20px";
h.style.fontSize="20px";
h.style.animation="fall 4s linear forwards";

document.body.appendChild(h);

setTimeout(()=>h.remove(),4000);
},300); 

document.body.innerHTML="";

document.body.style.display="flex";
document.body.style.justifyContent="center";
document.body.style.alignItems="center";
document.body.style.height="100vh";
document.body.style.background="linear-gradient(135deg,#0b001a,#2d004d)";
document.body.style.color="white";
document.body.style.textAlign="center";

document.body.innerHTML=`
<div>
<h1 style="color:#FFD700;font-size:40px;">❤️ Ooo my Dear budhuu Zubii ❤️</h1>

<p style="font-size:18px;line-height:1.8;">
Happy Birthday meri jaan🎂<br>
 Aise hi haste rehna mushkurate rehna ❤️ </p> Ulti Sidhi harkate karte rehna  😂 </p> Bass haant gande nhi kiya karo apne 🤣 </p> Baaki backchodi on top rakhna 😂 </p> Baaki sabse pehle khud ka dhayan rakha karo madam ❤ </p>️ Aur at last meri Pyari si, Cutie si, </p> (Sexy si, Hot si🤣), </p> Beautifull si ZUBI ko </p> Meri taraf se wishing you The Most Happiest Birthday Ever  ❤️ </p> Ummmaaaaahhhh 💋😘
</p>
</div>
`;

}  
  
function openGift(){

const box=document.querySelector(".gift");

box.classList.add("open");

document.getElementById("tapGift").style.display="none";

setTimeout(function(){

document.getElementById("giftBox").style.display="none";

const s2=document.getElementById("slide2");

s2.style.display="block";

setTimeout(function(){

s2.classList.add("show");

},100);

},1000);

}
  
// Floating circles
for(let i=0;i<25;i++){

let c=document.createElement("div");

c.className="circle";

let s=Math.random()*70+20;

c.style.width=s+"px";
c.style.height=s+"px";

c.style.left=Math.random()*100+"vw";

c.style.animationDuration=(Math.random()*5+6)+"s";

c.style.animationDelay=Math.random()*5+"s";

document.body.appendChild(c);

}

</script>

</body>
</html>
